<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
</head>
<style>
    /* 
        display: flex; -> flex container
        justify-content: space-between; -> flex items with help of same size of spaces between them
        justify-content: space-around; -> flex items with help of same size of spaces around them
        justify-content: space-evenly; -> flex items with help of same size of spaces between them and around them


    */
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        width: 100%;
    }
    .container{
        height: 500px;
        width: 700px;
        border: 2px solid red;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .item{
        background-color: chocolate;
        height: 100px;
        width: 100px;
    }
</style>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .container{
        display: flex;
        flex-direction: column;
        height: 600px;
        width: 500px;
        gap: 10px;
    }
    .box1{
        background-color: plum;
        height: 100px;
        width: 500px;
    }
    .box2{
        background-color: lightblue;
        height: 200px;
        width: 300px;
    }

    .box3{
        background-color: lightgreen;
        height: 100px;
        width: 300px;
    }
    .box4{
        background-color: lightcoral;
        height: 300px;
        width: 200px;
    }
    .container3{
        display: flex;
        flex-direction: row;
        height: 400px;
        width: 500px;
        gap: 10px;
    }
    .container1{
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
  </style>
  <body>
    <div class="container">
      <div class="box1"></div>
      <div class="container3">
        <div class="container1">
          <div class="box2"></div>
          <div class="box3"></div>
        </div>
        <div class="container2">
          <div class="box4"></div>
        </div>
      </div>
    </div>
  </body>
</html>

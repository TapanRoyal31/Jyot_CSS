<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
  </head>
  <script
    src="https://kit.fontawesome.com/ecedaf7aac.js"
    crossorigin="anonymous"
  ></script>
  <link rel="stylesheet" href="style.css" />
  <body>
    <div class="card">
      <div class="start">
        <p class="go">GO</p>
        <p class="offer">special offer</p>
      </div>
      <div class="second">
        <div style="display: flex">
          <p class="icon"><i class="fa-solid fa-indian-rupee-sign"></i></p>
          <del class="del price">399</del>
        </div>
        <div style="display: flex">
          <p class="icon"><i class="fa-solid fa-indian-rupee-sign"></i></p>
          <p class="zero price">0</p>
          <p class="text">
            INR/month (including GST) <br />
            for the first 12 month
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
